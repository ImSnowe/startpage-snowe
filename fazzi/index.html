<!doctype html>
<html lang="en">
<head>
  <title>~/startpage 💤</title>
  <meta name="darkreader-lock" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!--
    OPTIMIZATION 1: Read localStorage synchronously before any paint so
    the correct theme colors are applied immediately — zero FOUC.
    Also generates the correct <link rel="preload"> for the active image.
  -->
  <script>
    (function () {
      var IMAGES = ["cover1.webp", "cover2.webp", "cover3.webp", "cover4.webp"];
      var COLOR_SETS = [
        { "--text-color": "#c0caf5", "--hover-color": "#bb9af7", "--accent-color": "#7aa2f7", "--accent-color-2": "#f7768e",  "--background-color": "#1E1E2E" },
        { "--text-color": "#9fadc6", "--hover-color": "#9B5856", "--accent-color": "#28725A", "--accent-color-2": "#D2C7CB", "--background-color": "#15191d" },
        { "--text-color": "#c0caf5", "--hover-color": "#e0af68", "--accent-color": "#7aa2f7", "--accent-color-2": "#bb9af7", "--background-color": "#1a1b26" },
        { "--text-color": "#EAEFFD", "--hover-color": "#FDB6A7", "--accent-color": "#556BFF", "--accent-color-2": "#FA87A6", "--background-color": "#16191F" },
      ];

      // Expose to page scope
      window._SP = {
        idx: parseInt(localStorage.getItem("currentIndex")) || 0,
        images: IMAGES,
        colorSets: COLOR_SETS,
      };

      // Inject CSS variables via a <style> block so colors are painted
      // on the very first frame — no JS-after-load round trip needed.
      var colors = COLOR_SETS[window._SP.idx];
      var css = ":root{";
      for (var k in colors) css += k + ":" + colors[k] + ";";
      css += "}";
      document.write("<style>" + css + "</style>");

      // OPTIMIZATION 2: Tell the browser to fetch the correct cover image
      // immediately using a high-priority preload — it starts downloading
      // in parallel with the rest of the HTML parse.
      document.write(
        '<link rel="preload" href="src/images/' + IMAGES[window._SP.idx] +
        '" as="image" fetchpriority="high" />'
      );
    })();
  </script>

  <!-- OPTIMIZATION 3: Preload the font (woff2 only — woff is IE9-11 only) -->
  <link rel="preload" href="src/fonts/SpaceMonoNF.woff2" as="font" type="font/woff2" crossorigin />

  <link rel="icon" href="https://raw.githubusercontent.com/NixOS/nixos-artwork/refs/heads/master/logo/nix-snowflake-white.svg" />

  <!--
    OPTIMIZATION 4: Inline all CSS — eliminates a render-blocking
    stylesheet request entirely.
  -->
  <style>
    @font-face {
      font-family: "SpaceMono Nerd Font";
      /* OPTIMIZATION 5: Drop woff fallback (IE9-11 only).
         woff2 has 96%+ global support and saves one extra entry. */
      font-display: swap;
      src:
        local("SpaceMono Nerd Font"),
        url(src/fonts/SpaceMonoNF.woff2) format("woff2");
    }

    :root {
      color-scheme: dark;
    }

    /* OPTIMIZATION 6: Always allow background-color transition.
       The original only applied it after .loaded — but since we set
       colors in the first paint there is no risk of a transition flash. */
    html {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100svh;
      background-color: var(--background-color);
      background-image: url("src/bgs/topography.svg");
      overflow-x: clip;
      transition: background-color 0.2s ease-in-out;
    }

    body {
      display: flex;
      color: var(--text-color);
      font-family: "SpaceMono Nerd Font", monospace;
      justify-content: center;
      align-items: center;
    }

    img {
      transition:
        transform 0.15s ease-in-out,
        opacity 0.2s ease-in-out;
    }

    #text,
    #image {
      opacity: 0;
      transition: opacity 0.2s ease-in;
    }

    #text.loaded,
    #image.loaded {
      opacity: 1;
    }

    #text.loaded * {
      transition: color 0.2s ease-in-out;
    }

    #carouselImage {
      height: 550px;
      aspect-ratio: 9 / 16;
      border-radius: 6px;
      box-shadow: 0px 5px 15px 0px rgba(0, 0, 0, 0.5);
      object-fit: cover;
    }

    /* OPTIMIZATION 7: Consolidated #image rules (was split into two
       separate blocks with margin-right AND padding-right). */
    #image {
      padding-right: 2em;
    }

    #carouselImage:hover {
      transform: scale(1.1);
      cursor: pointer;
    }

    @media (max-width: 800px) {
      img,
      #image {
        display: none;
        margin: 0;
        padding: 0;
      }
    }

    #greeting {
      color: var(--accent-color-2);
      font-size: 2.5em;
      font-weight: 900;
      grid-column: 1 / -1;
      text-align: center;
      display: grid;
    }

    #date {
      font-size: 1.3em;
      font-weight: 600;
      color: var(--accent-color);
      display: grid;
      grid-column: 1 / -1;
      text-align: center;
      margin: 1em 0;
    }

    .header {
      color: var(--accent-color);
      font-size: 1.6em;
      font-weight: 600;
    }

    #links {
      display: grid;
      grid-row-gap: 0.5em;
      grid-template-columns: repeat(2, 1fr);
    }

    ul {
      list-style-type: none;
      padding-left: 1em;
      margin-left: 0;
    }

    a {
      color: var(--text-color);
      font-size: 1.2em;
      text-decoration: none;
    }

    a:hover {
      color: var(--hover-color);
      font-style: italic;
    }

    .fazzi .urls:nth-child(even) {
      padding-left: 1.5em;
    }
  </style>
</head>

<body class="fazzi">
  <div id="image" onclick="nextImage()">
    <!--
      OPTIMIZATION 8: No src here — JS sets the correct src immediately
      below. The original HTML hard-coded cover1.webp, which caused a
      double-fetch whenever a different theme was saved in localStorage.
      fetchpriority="high" + decoding="async" = browser prioritizes
      decode off the main thread.
    -->
    <img id="carouselImage" fetchpriority="high" decoding="async" alt="Cover image" />
  </div>

  <div id="text">
    <div id="greeting">Welcome $HOME!</div>
    <div id="date"></div>
    <div id="links">
      <div class="urls">
        <div class="header">~/general </div>
        <ul>
          <li><a target="_blank" rel="noopener" href="https://youtube.com">YouTube</a></li>
          <li><a target="_blank" rel="noopener" href="https://monkeytype.com">MonkeyType</a></li>
          <li><a target="_blank" rel="noopener" href="https://mail.google.com">Gmail</a></li>
          <li><a target="_blank" rel="noopener" href="https://mail.tutanota.com/mail">TutaMail</a></li>
          <li><a target="_blank" rel="noopener" href="https://account.proton.me/apps">Proton</a></li>
        </ul>
      </div>
      <div class="urls">
        <div class="header">~/devel </div>
        <ul>
          <li><a target="_blank" rel="noopener" href="https://chatgpt.com">ChatGPT</a></li>
          <li><a target="_blank" rel="noopener" href="https://claude.ai">Claude</a></li>
          <li><a target="_blank" rel="noopener" href="https://chat.deepseek.com">DeepSeek</a></li>
          <li><a target="_blank" rel="noopener" href="https://gemini.google.com">Gemini</a></li>
          <li><a target="_blank" rel="noopener" href="https://github.com/ImSnowe?tab=repositories">GitHub</a></li>
        </ul>
      </div>
      <div class="urls">
        <div class="header">~/school 󰑴</div>
        <ul>
          <li><a target="_blank" rel="noopener" href="https://canva.com">Canva</a></li>
          <li><a target="_blank" rel="noopener" href="https://docs.google.com">Docs</a></li>
          <li><a target="_blank" rel="noopener" href="https://web.whatsapp.com">WhatsApp</a></li>
          <li><a target="_blank" rel="noopener" href="https://discord.com">Discord</a></li>
          <li><a target="_blank" rel="noopener" href="https://smpkby.elabschool.sch.id/my/">E-Learning</a></li>
        </ul>
      </div>
      <div class="urls">
        <div class="header">~/reddit </div>
        <ul>
          <li><a target="_blank" rel="noopener" href="https://reddit.com/">Reddit</a></li>
          <li><a target="_blank" rel="noopener" href="https://reddit.com/r/unixporn/">r/unixporn</a></li>
          <li><a target="_blank" rel="noopener" href="https://reddit.com/r/linux/">r/linux</a></li>
          <li><a target="_blank" rel="noopener" href="https://reddit.com/r/privacy/">r/privacy</a></li>
          <li><a target="_blank" rel="noopener" href="https://reddit.com/r/startpages/">r/startpages</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!--
    OPTIMIZATION 9: Single inline <script> at end of body.
    - No async/defer needed (it's at the bottom, DOM is already parsed)
    - No document.currentScript hack (was broken with async anyway)
    - Eliminates 2 extra HTTP round-trips (date.js + theme.js)
  -->
  <script>
    (function () {
      var sp = window._SP; // state set in <head>
      var currentIndex = sp.idx;
      var images = sp.images;
      var colorSets = sp.colorSets;

      // --- Image ---
      var imgEl = document.getElementById("carouselImage");
      // Set correct src once — no double-fetch.
      imgEl.src = "src/images/" + images[currentIndex];

      // --- Colors (already applied in <head>, but keep in sync for cycling) ---
      function updateColors() {
        var colorSet = colorSets[currentIndex];
        for (var prop in colorSet) {
          document.documentElement.style.setProperty(prop, colorSet[prop]);
        }
      }

      // --- Carousel ---
      window.nextImage = function () {
        currentIndex = (currentIndex + 1) % images.length;
        localStorage.setItem("currentIndex", currentIndex);
        imgEl.style.opacity = "0";
        updateColors();
        setTimeout(function () {
          imgEl.src = "src/images/" + images[currentIndex];
          imgEl.style.opacity = "1";
        }, 200);
      };

      // OPTIMIZATION 10: Fade in as soon as the carousel image loads —
      // not window.onload which waits for every single resource
      // (fonts, background SVG, all other images, etc.).
      function revealPage() {
        document.getElementById("image").classList.add("loaded");
        document.getElementById("text").classList.add("loaded");

        // OPTIMIZATION 11: Preload only the OTHER images (skip current).
        // Use requestIdleCallback so it doesn't compete with paint.
        var preload = function () {
          images.forEach(function (name, i) {
            if (i === currentIndex) return;
            var el = new Image();
            el.src = "src/images/" + name;
          });
        };
        if ("requestIdleCallback" in window) {
          requestIdleCallback(preload);
        } else {
          setTimeout(preload, 500);
        }
      }

      // If the preloaded image is already in cache it may be complete instantly
      if (imgEl.complete && imgEl.naturalWidth > 0) {
        revealPage();
      } else {
        imgEl.addEventListener("load", revealPage, { once: true });
      }

      // --- Clock ---
      var dateEl = document.getElementById("date");
      var dateOptions = {
        weekday: "long",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        day: "2-digit",
        month: "2-digit",
        year: "2-digit",
      };

      function showTime() {
        var d = new Date();
        var parts = d.toLocaleString("en-GB", dateOptions).split(", ");
        // OPTIMIZATION 12: textContent instead of innerHTML for a text-only node.
        dateEl.textContent = parts[0] + ", " + parts[2] + " | " + parts[1];
      }

      showTime();
      setInterval(showTime, 1000);
    })();
  </script>
</body>
</html>
